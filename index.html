<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader-overlay">
        <div class="counter-box"><span id="load-number">0</span>%</div>
    </div>

    <div class="card">
        <div class="icon-container"><img id="gameIcon" src=""></div>
        <h1 id="title">Loading...</h1>
        <p class="creator" id="dev">Please wait</p>
        <div class="stats-grid">
            <div class="stat-box"><span class="label">Visits</span><span id="visits" class="value">-</span></div>
            <div class="stat-box"><span class="label">Playing</span><span id="playing" class="value">-</span></div>
            <div class="stat-box"><span class="label">Favorites</span><span id="favs" class="value">-</span></div>
            <div class="stat-box"><span class="label">Rating</span><span id="rating" class="value">-%</span></div>
        </div>
        <div class="thumb-box"><img id="thumb" src=""></div>
        
        <a href="https://www.roblox.com/games/137436516523280" target="_blank" class="play-btn">PLAY HERE!</a>
        
        <input type="range" id="vol" min="0" max="100" value="50" style="margin-top:15px">
    </div>

    <div class="music-card">
        <div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="music-info">
            <span class="song-sub">NOW PLAYING</span>
            <span class="song-title">magnolia — keshi</span>
        </div>
    </div>

    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
