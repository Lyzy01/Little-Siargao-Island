<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="icon-container"><img id="gameIcon" src=""></div>
        <h1 id="title">...</h1>
        <p class="creator" id="dev">...</p>
        <div class="stats-grid">
            <div class="stat-box"><span class="label">Visits</span><span class="value" id="visits">-</span></div>
            <div class="stat-box"><span class="label">Playing</span><span class="value" id="playing">-</span></div>
            <div class="stat-box"><span class="label">Favorites</span><span class="value" id="favs">-</span></div>
            <div class="stat-box"><span class="label">Rating</span><span class="value" id="rating">-</span></div>
        </div>
        <div class="thumb-box"><img id="thumb" src=""></div>
        <input type="range" id="vol" min="0" max="100" value="50">
    </div>

    <div class="music-card">
        <div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="music-info"><span class="song-sub">NOW PLAYING</span><span class="song-title">magnolia — keshi</span></div>
    </div>

    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
